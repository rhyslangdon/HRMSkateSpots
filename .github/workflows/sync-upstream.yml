name: Sync Fork with Upstream

# This workflow lives in upstream so it is preserved when forks sync.
# It only does anything in a personal fork — the repository_dispatch
# event type "upstream-sync" is never sent to this repo.

on:
  repository_dispatch:
    types: [upstream-sync]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.UPSTREAM_PAT }}

      - name: Sync upstream changes
        run: |
          git remote add upstream https://x-access-token:${{ secrets.UPSTREAM_PAT }}@github.com/NSCC-ITC-Winter2026-WEBD3031-700-MCa/nscc-itc-winter2026-webd3031-project-Project-NextJS-StarterTemplate.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
