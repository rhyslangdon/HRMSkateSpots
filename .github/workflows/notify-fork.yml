name: Notify Fork of Changes

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger fork sync
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.FORK_SYNC_PAT }}" \
            https://api.github.com/repos/SBraden04/nscc-itc-winter2026-webd3031-project-Project-NextJS-StarterTemplate/dispatches \
            -d '{"event_type":"upstream-sync"}'
